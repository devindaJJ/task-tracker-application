name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/

      - name: Run tests
        env:
          # Only used to satisfy pydantic-settings at import time; the test
          # suite itself runs against an isolated in-memory SQLite DB
          # (see app/tests/conftest.py), not this Postgres URL.
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/placeholder
          DATABASE_URL_SYNC: postgresql+psycopg2://user:pass@localhost:5432/placeholder
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        run: pytest -v

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
