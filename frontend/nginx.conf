server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing (React Router) -- any path that isn't a real file
    # falls back to index.html so deep links like /tasks work on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
